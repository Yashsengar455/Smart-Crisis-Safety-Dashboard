<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Safety Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🔝 Navbar -->
    <nav class="navbar">
        <h1>Meow Weather</h1>
        <button id="themeToggle">🌙</button>
    </nav>

    <!-- 🔍 Search Section -->
    <section class="search-section">
        <input type="text" id="cityInput" placeholder="Enter city (e.g. Delhi)">
        <button id="searchBtn">Search</button>
    </section>

    <!-- 🎯 Filter Section -->
    <section class="filter-section">
        <button class="filter-btn active" data-type="all">All</button>
        <button class="filter-btn" data-type="weather">Weather</button>
        <button class="filter-btn" data-type="earthquake">Earthquake</button>
        <button class="filter-btn" data-type="news">News</button>
    </section>

    <!-- ⚡ Loader -->
    <div id="loader" class="loader hiddens"></div>

    <!-- ❌ Error Message -->
    <p id="error" class="error hidden">Something went wrong</p>

    <!-- 📦 Cards Container -->
    <section id="cardsContainer" class="cards-container">
        <!-- Cards will be injected here -->
    </section>

    <!-- ❤️ Favorites Section -->
    <section class="favorites">
        <h2>❤️ Saved Alerts</h2>
        <div id="favoritesContainer" class="cards-container"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
